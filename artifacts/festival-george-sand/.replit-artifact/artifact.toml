kind = "web"
previewPath = "/"
title = "Festival George Sand du Court-métrage"
version = "1.0.0"
id = "artifacts/festival-george-sand"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23222

[services.development]
run = "pnpm --filter @workspace/festival-george-sand run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/festival-george-sand", "run", "build" ]
publicDir = "artifacts/festival-george-sand/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23222"
BASE_PATH = "/"
